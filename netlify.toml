[build]
  command = ""
  publish = "deploy"

# Security headers — applicati a tutte le pagine
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "SAMEORIGIN"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://maps.google.com https://www.google.com; connect-src 'self'"

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Cache-Control — dati CMS (nessuna cache: si aggiornano dal pannello admin)
[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache-Control — static assets (immutable, 1 anno)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/foto-la-dimora/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/foto-la-bottega/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/foto-zona/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache-Control — pagine HTML (rivalidate ogni ora)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ============================================================
# BLOG — REDIRECT 301 legacy: blog-articolo-N.html → /blog/[slug]/
# Questi redirect gestiscono la compatibilità SEO per i vecchi URL.
# Le nuove URL canoniche sono sito/blog/[slug]/index.html (senza redirect).
# ============================================================

# Articolo 1 — Cosa fare a Manfredonia
[[redirects]]
  from   = "/blog-articolo-1.html"
