backend:
  name: git-gateway
  branch: main

media_folder: "foto-homepage"
public_folder: "/foto-homepage"

locale: it

collections:
  - name: "prezzi"
    label: "💶 Prezzi"
    files:
      - label: "Prezzi camere"
        name: "prezzi"
        file: "sito/_data/prezzi.json"
        fields:
          - label: "Alta stagione (Lug–Set)"
            name: "alta"
            widget: "object"
            fields:
              - { label: "Etichetta periodo", name: "label", widget: "string" }
              - { label: "La Dimora — prezzo/notte (€)", name: "dimora", widget: "number", value_type: "int" }
              - { label: "La Bottega — prezzo/notte (€)", name: "bottega", widget: "number", value_type: "int" }
          - label: "Bassa stagione (Ott–Giu)"
            name: "bassa"
            widget: "object"
            fields:
              - { label: "Etichetta periodo", name: "label", widget: "string" }
              - { label: "La Dimora — prezzo/notte (€)", name: "dimora", widget: "number", value_type: "int" }
              - { label: "La Bottega — prezzo/notte (€)", name: "bottega", widget: "number", value_type: "int" }
          - { label: "Maggiorazione OTA (es. 1.20 = +20%)", name: "ota_markup", widget: "number", value_type: "float" }
          - { label: "Sconto 7+ notti (es. 0.10 = 10%)", name: "weekly_discount", widget: "number", value_type: "float" }
          - { label: "Sconto 30+ notti (es. 0.20 = 20%)", name: "monthly_discount", widget: "number", value_type: "float" }

  - name: "testi"
    label: "✏️ Testi"
    files:
      - label: "Testi camere e chi siamo"
        name: "testi"
        file: "sito/_data/testi.json"
        fields:
          - { label: "Descrizione La Dimora", name: "dimora", widget: "text" }
          - { label: "Descrizione La Bottega", name: "bottega", widget: "text" }
          - { label: "Chi siamo", name: "chi_siamo", widget: "text" }

  - name: "blog"
    label: "📝 Articoli Blog"
    folder: "sito/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Categoria"
        name: "category"
        widget: "select"
        options: ["Itinerari", "Borghi", "Mare", "Cibo e Vino", "Tradizioni", "Esperienze"]
      - { label: "Descrizione breve (SEO)", name: "description", widget: "text" }
      - { label: "Immagine di copertina", name: "image", widget: "image", required: false }
      - { label: "Slug (URL)", name: "slug", widget: "string" }
      - { label: "Contenuto", name: "body", widget: "markdown" }
